spring.application.name=linecup

spring.datasource.url=jdbc:mysql://127.0.0.1:3306/linecup?useUnicode=true&characterEncoding=utf8&connectionTimeZone=UTC&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=linecup_app
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

mes.l2.stale-after=30s